name = "lyriclens-api"
main = "worker.js"
compatibility_date = "2026-06-01"
workers_dev = false

# Route the Worker to the lyriclens subdomain. The DNS record
# (AAAA 100:: proxied=true) is created via the API in parallel.
routes = [
  { pattern = "lyriclens.yoru-and-akari.dev/*", zone_id = "4f9b5c7236e63090439676eec70031e2" }
]

# Per-IP daily rate-limit counter for /feedback. Created via
# `wrangler kv namespace create FEEDBACK_RL`. If this binding is missing the
# Worker still serves /feedback but logs a warning and skips the cap.
[[kv_namespaces]]
binding = "FEEDBACK_RL"
id = "a53e138ad6ab4dfd88fbb7ce358375c6"

# Lazy-cached fonts + release binaries. Worker writes through to R2 on a
# miss so the first request after a deploy hydrates the bucket; subsequent
# requests skip the upstream hop. If this binding is missing the proxy
# routes degrade to a one-shot fetch (no caching) and log a warning.
[[r2_buckets]]
binding = "R2_ASSETS"
bucket_name = "lyriclens-assets"
